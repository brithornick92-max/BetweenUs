# saved-moments-flow.yaml — E2E test: Open Keepsake from Home
# Tests the Keepsake entry point and verifies the current Our Story screen renders.

appId: com.brittany.betweenus

---

- launchApp

# Expo dev-client builds may open the development server picker first.
- tapOn:
    text: "http://localhost:8082"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true

- waitForAnimationToEnd

- extendedWaitUntil:
    visible: ".*Keepsake.*|.*TODAY BETWEEN US.*|.*JUST US.*"
    timeout: 10000

- tapOn: "Keepsake"
- waitForAnimationToEnd

- assertVisible:
    text: ".*Keepsake.*"

- assertVisible:
    text: ".*OUR STORY.*|.*keepsakes.*|.*Newest first.*"

- assertVisible:
    text: ".*Prompts, snapshots, dates tried, and positions tried.*|.*keepsakes, newest first.*|.*Newest first.*"
