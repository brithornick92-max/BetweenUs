# premium-flow.yaml — E2E test: Premium surfaces verification
# Tests: Premium-related surfaces remain reachable and render on the current account state.

appId: com.brittany.betweenus

---

- launchApp

# Expo dev-client builds may open the development server picker first.
- tapOn:
    text: "http://localhost:8082"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true

- waitForAnimationToEnd

- extendedWaitUntil:
    visible: ".*TODAY BETWEEN US.*|.*JUST US.*|.*Keepsake.*|.*Home.*"
    timeout: 10000

# Verify premium-related surfaces from the current signed-in state

# Navigate to Prompts
- tapOn: "Prompts, tab, 2 of 5"
- waitForAnimationToEnd

# Prompt screen should render one of the free or premium prompt surfaces
- assertVisible:
    text: ".*Prompts.*|.*Reflection.*|.*Unlock Pro Reflection.*|.*Shared Wisdom.*"

# Navigate to Date Plans
- tapOn: "Dates, tab, 4 of 5"
- waitForAnimationToEnd

# Date screen should render and expose either content or premium upsell copy
- assertVisible:
    text: ".*date.*|.*draw.*|.*Discover more.*|.*premium.*|.*unlock.*|.*more waiting for you.*"

# Navigate to Settings and check premium section
- tapOn: "Settings, tab, 5 of 5"
- waitForAnimationToEnd

- swipe:
    start: 50%, 80%
    end: 50%, 20%
    duration: 600

- assertVisible:
    text: ".*Premium.*|.*Pro.*|.*Upgrade.*|.*Subscription.*|.*Manage.*"
