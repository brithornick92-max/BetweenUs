# date-night-flow.yaml — E2E test: Date night card browsing
# Tests: filter dropdowns, card flip, swipe right/left, today's picks

appId: com.brittany.betweenus

---

- launchApp

# Expo dev-client builds may open the development server picker first.
- tapOn:
    text: "http://localhost:8082"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true

- waitForAnimationToEnd

# Navigate to Dates tab
- tapOn: "Dates, tab, 4 of 5"
- waitForAnimationToEnd

# Should see the dates header
- assertVisible:
    text: ".*Dates.*|.*ideas ready.*|.*Preparing ideas.*"

# Open filter controls (if not already open)
- tapOn:
    id: "filter-toggle"
    optional: true
- waitForAnimationToEnd

# Try tapping a filter dropdown (Mood)
- tapOn:
    text: "Mood"
    optional: true
- waitForAnimationToEnd

# Dismiss dropdown by tapping elsewhere or selecting
- tapOn:
    text: ".*Any.*"
    optional: true

# Tap top card to flip (reveal)
- tapOn:
    text: ".*tap to reveal.*"
    optional: true
- waitForAnimationToEnd

# Swipe right (like for today)
- swipe:
    direction: RIGHT
    duration: 500

- waitForAnimationToEnd

# Verify the saved-date shortlist appears after liking an idea
- assertVisible:
    text: ".*Shortlist.*|.*selected.*|.*Shuffle Deck.*"
