# core-loop.yaml — E2E test: Home → main tabs/actions smoke flow
# Tests the critical daily surfaces still render and route.
#
# Prerequisite: User is authenticated and onboarded (on Home tab).

appId: com.brittany.betweenus

---

- launchApp

# Expo dev-client builds may open the development server picker first.
- tapOn:
    text: "http://localhost:8082"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true

# Wait for home screen to load
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*TODAY BETWEEN US.*|.*JUST US.*|.*Keepsake.*"
    timeout: 10000

# Navigate to Prompts tab
- tapOn: "Prompts, tab, 2 of 5"
- waitForAnimationToEnd

# Should see prompt content
- assertVisible:
    text: ".*Prompts.*|.*questions.*|.*reflection.*"

# Tap on a prompt to answer it (if premium or free preview)
- tapOn:
    index: 0
    id: "prompt-card"
    optional: true
- waitForAnimationToEnd

# Navigate to the Date Plans tab
- tapOn: "Dates, tab, 4 of 5"
- waitForAnimationToEnd

# Should see date night content
- assertVisible:
    text: ".*date.*|.*draw.*"

# Navigate to Calendar tab
- tapOn: "Calendar, tab, 3 of 5"
- waitForAnimationToEnd

# Navigate to Settings tab
- tapOn: "Settings, tab, 5 of 5"
- waitForAnimationToEnd

# Should see settings content
- assertVisible:
    text: ".*Settings.*|.*Sign Out.*"

# Return to Home
- tapOn: "Home, tab, 1 of 5"
- waitForAnimationToEnd

# Open Keepsake from Home action card
- tapOn: "Keepsake"
- waitForAnimationToEnd

- assertVisible:
    text: ".*Keepsake.*|.*OUR STORY.*"
