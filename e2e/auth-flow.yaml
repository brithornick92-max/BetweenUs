# auth-flow.yaml — E2E test: Authentication flow
# Tests: sign-up screen loads, auth UI elements present, magic link flow initiates

appId: com.brittany.betweenus

---

- launchApp:
    clearState: true

# Expo dev-client builds may open the development server picker first.
- tapOn:
    text: "http://localhost:8082"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- waitForAnimationToEnd

# Intro screen should appear before account friction for new users
- assertVisible:
    text: ".*private app for couples.*"
- assertVisible: "Made for couples"
- assertVisible: "INSIDE THE APP"
- assertVisible: "Couple prompts"
- assertVisible: "Account required for pairing"

- scroll
- assertVisible:
    text: ".*not used for marketing emails.*"

# Continue into the sign-in form
- tapOn: "Sign In"
- waitForAnimationToEnd

# Auth form should now be visible
- assertVisible: "Email address"
- assertVisible: "Password"

# Verify the auth flow still has key elements
- assertVisible:
    text: ".*Between Us.*"

# Enter a test email
- tapOn: "Email address"
- inputText: "test@example.com"

- tapOn: "Password"
- inputText: "password123"

# Tap the sign-in button
- tapOn: "Sign In"

# Should show feedback (loading or confirmation)
- waitForAnimationToEnd
