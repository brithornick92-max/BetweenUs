<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Illustration Review Grid</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 24px; background: #f7f7f8; }
    h1 { margin-bottom: 8px; }
    p { color: #555; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(220px, 1fr)); gap: 20px; }
    .card { background: white; border: 1px solid #ddd; border-radius: 12px; padding: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    img { width: 100%; height: 160px; object-fit: contain; background: #fff; border: 1px solid #eee; border-radius: 8px; }
    .name { margin-top: 10px; font-size: 18px; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Illustration Review Grid</h1>
  <p>Batch preview for rename mapping.</p>
  <div class="grid">
    <div class="card"><img src="1.png" alt="1.png"><div class="name">1.png</div></div>
    <div class="card"><img src="2.png" alt="2.png"><div class="name">2.png</div></div>
    <div class="card"><img src="3.png" alt="3.png"><div class="name">3.png</div></div>
    <div class="card"><img src="4.png" alt="4.png"><div class="name">4.png</div></div>
    <div class="card"><img src="5.png" alt="5.png"><div class="name">5.png</div></div>
    <div class="card"><img src="6.png" alt="6.png"><div class="name">6.png</div></div>
    <div class="card"><img src="7.png" alt="7.png"><div class="name">7.png</div></div>
    <div class="card"><img src="8.png" alt="8.png"><div class="name">8.png</div></div>
    <div class="card"><img src="9.png" alt="9.png"><div class="name">9.png</div></div>
    <div class="card"><img src="10.png" alt="10.png"><div class="name">10.png</div></div>
    <div class="card"><img src="11.png" alt="11.png"><div class="name">11.png</div></div>
    <div class="card"><img src="12.png" alt="12.png"><div class="name">12.png</div></div>
    <div class="card"><img src="13.png" alt="13.png"><div class="name">13.png</div></div>
    <div class="card"><img src="14.png" alt="14.png"><div class="name">14.png</div></div>
    <div class="card"><img src="15.png" alt="15.png"><div class="name">15.png</div></div>
    <div class="card"><img src="16.png" alt="16.png"><div class="name">16.png</div></div>
    <div class="card"><img src="Untitled design (2).png" alt="Untitled design (2).png"><div class="name">Untitled design (2).png</div></div>
  </div>
</body>
</html>
